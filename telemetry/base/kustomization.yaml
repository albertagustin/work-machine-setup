apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

resources:
  - namespace.yaml
  - ingress.yaml

configMapGenerator:
  - name: grafana-dashboards
    namespace: observability
    files:
      - ai-tools-overview.json
    options:
      labels:
        grafana_dashboard: "1"
      disableNameSuffixHash: true
