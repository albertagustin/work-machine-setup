image:
  repository: otel/opentelemetry-collector-contrib

mode: deployment

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 512Mi

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP

service:
  type: ClusterIP

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  processors:
    batch:
      timeout: 5s
      send_batch_size: 1024
    resource:
      attributes:
        - key: environment
          value: local-eval
          action: upsert
    groupbytrace:
      wait_duration: 10s
      num_traces: 100000
    transform/fix-orphan-roots:
      trace_statements:
        - context: span
          statements:
            # VS Code Copilot Chat never exports the invoke_agent root span,
            # leaving all child spans orphaned. Promote every copilot-chat
            # span to root so Tempo can index the trace by service name.
            # Spans still share the same trace ID so the trace view is intact.
            - set(parent_span_id, SpanID(0x0000000000000000))
              where resource.attributes["service.name"] == "copilot-chat"

  exporters:
    otlphttp/tempo:
      endpoint: http://tempo.observability.svc:4318
      tls:
        insecure: true

    otlphttp/loki:
      endpoint: http://loki.observability.svc:3100/otlp
      tls:
        insecure: true

    prometheusremotewrite:
      endpoint: http://prometheus-server.observability.svc:80/api/v1/write
      tls:
        insecure: true

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [groupbytrace, transform/fix-orphan-roots, batch, resource]
        exporters: [otlphttp/tempo]
      metrics:
        receivers: [otlp]
        processors: [batch, resource]
        exporters: [prometheusremotewrite]
      logs:
        receivers: [otlp]
        processors: [batch, resource]
        exporters: [otlphttp/loki]
