image:
  repository: otel/opentelemetry-collector-contrib

mode: deployment

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP

service:
  type: ClusterIP

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  processors:
    batch:
      timeout: 5s
      send_batch_size: 1024
    resource:
      attributes:
        - key: environment
          value: local-eval
          action: upsert

  exporters:
    otlphttp/tempo:
      endpoint: http://tempo.observability.svc:4318
      tls:
        insecure: true

    otlphttp/loki:
      endpoint: http://loki.observability.svc:3100/otlp
      tls:
        insecure: true

    prometheusremotewrite:
      endpoint: http://prometheus-server.observability.svc:80/api/v1/write
      tls:
        insecure: true

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch, resource]
        exporters: [otlphttp/tempo]
      metrics:
        receivers: [otlp]
        processors: [batch, resource]
        exporters: [prometheusremotewrite]
      logs:
        receivers: [otlp]
        processors: [batch, resource]
        exporters: [otlphttp/loki]
