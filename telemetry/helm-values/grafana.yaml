persistence:
  enabled: false

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.observability.svc:80
        isDefault: true
        access: proxy
      - name: Loki
        type: loki
        url: http://loki.observability.svc:3100
        access: proxy
      - name: Tempo
        type: tempo
        url: http://tempo.observability.svc:3200
        access: proxy
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
          serviceMap:
            datasourceUid: prometheus

sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: observability

service:
  type: ClusterIP

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 512Mi
